name: Endchan Auto-Post

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required secrets
        env:
          GDRIVE_FOLDER_ID_ENDCHAN: ${{ secrets.GDRIVE_FOLDER_ID_ENDCHAN }}
        run: |
          [ -n "$GDRIVE_FOLDER_ID_ENDCHAN" ] || (echo "GDRIVE_FOLDER_ID_ENDCHAN is empty" && exit 1)
          echo "Secrets validated (GOOGLE_API_KEY recommended for reliable Drive access)"

      - name: Run uploader (attempt 1)
        id: attempt1
        continue-on-error: true
        env:
          GDRIVE_FOLDER_ID_ENDCHAN: ${{ secrets.GDRIVE_FOLDER_ID_ENDCHAN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ENDCHAN_BOARD: b
        run: python upload.py

      - name: Wait before retry 2
        if: steps.attempt1.outcome == 'failure'
        run: echo "Attempt 1 failed. Waiting 60s..." && sleep 60

      - name: Run uploader (attempt 2)
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        continue-on-error: true
        env:
          GDRIVE_FOLDER_ID_ENDCHAN: ${{ secrets.GDRIVE_FOLDER_ID_ENDCHAN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ENDCHAN_BOARD: b
        run: python upload.py

      - name: Wait before retry 3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        run: echo "Attempt 2 failed. Waiting 120s..." && sleep 120

      - name: Run uploader (attempt 3)
        id: attempt3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        env:
          GDRIVE_FOLDER_ID_ENDCHAN: ${{ secrets.GDRIVE_FOLDER_ID_ENDCHAN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ENDCHAN_BOARD: b
        run: python upload.py

      - name: Commit upload log
        if: steps.attempt1.outcome == 'success' || steps.attempt2.outcome == 'success' || steps.attempt3.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uploaded_endchan.json
          git diff --staged --quiet || git commit -m "Update Endchan upload log [skip ci]"
          git push

      - name: LINE notify on failure
        if: steps.attempt1.outcome == 'failure' && (steps.attempt2.outcome == 'failure' || steps.attempt2.outcome == 'skipped') && (steps.attempt3.outcome == 'failure' || steps.attempt3.outcome == 'skipped')
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
            -d "{
              \"to\": \"${LINE_USER_ID}\",
              \"messages\": [{
                \"type\": \"text\",
                \"text\": \"⚠️ Endchan自動投稿が3回リトライしても失敗しました\n\n時刻: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')\nログ: https://github.com/MuscleLove-777/endchan-auto-uploader/actions/runs/${{ github.run_id }}\"
              }]
            }"

      - name: LINE notify on success
        if: steps.attempt1.outcome == 'success' || steps.attempt2.outcome == 'success' || steps.attempt3.outcome == 'success'
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          RETRY_INFO=""
          if [ "${{ steps.attempt2.outcome }}" = "success" ]; then
            RETRY_INFO="（2回目で成功）"
          elif [ "${{ steps.attempt3.outcome }}" = "success" ]; then
            RETRY_INFO="（3回目で成功）"
          fi
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
            -d "{
              \"to\": \"${LINE_USER_ID}\",
              \"messages\": [{
                \"type\": \"text\",
                \"text\": \"✅ Endchan自動投稿 成功${RETRY_INFO}\n時刻: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')\"
              }]
            }"
