name: Endchan Auto-Post

on:
  schedule:
    # 11:00 JST = 02:00 UTC
    - cron: '0 2 * * *'
    # 23:00 JST = 14:00 UTC
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Endchan uploader
        env:
          GDRIVE_FOLDER_ID_ENDCHAN: ${{ secrets.GDRIVE_FOLDER_ID_ENDCHAN }}
          ENDCHAN_BOARD: b
        run: python upload.py

      - name: Commit upload log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uploaded_endchan.json
          git diff --staged --quiet || git commit -m "Update Endchan upload log [skip ci]"
          git push
